# 未署名インストーラーを誤って公開しないため、この workflow は自動 Release しない。
# 署名済み Release は tools/signing/release-signed.ps1 をローカルで実行して作成する。
name: Release guidance

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guidance:
    runs-on: windows-latest
    steps:
      - name: Explain signed release flow
        run: |
          echo "Unsigned GitHub Actions releases are disabled."
          echo "Create signed releases locally with tools/signing/release-signed.ps1."
          echo "Do not put PFX files, private keys, or passwords in GitHub Actions unless a secure signing flow is designed."
